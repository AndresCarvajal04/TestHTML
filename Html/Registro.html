<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="../CSS/Style.css">
    <link rel="stylesheet" href="../CSS/Registro.css">
</head>
<body>

<header>
    <img src="../assets/logo.pp.png" alt="Logo" class="logo">
    <div class="auth-buttons">
        <a href="Login.html" class="btn-login">Iniciar Sesión</a>
        <a href="index.html" class="btn-inicio">Inicio</a>
    </div>
</header>
<main>
    <div class="contenedor">
    <div class="Formulario">
    <form id="formRegistro">
      <h1>Nombre Completo</h1>
      <input type="text" id="nombre" placeholder="Nombre" required>
      <h1>Correo Electrónico</h1>
      <input type="email" id="email" placeholder="Correo Electrónico" required>
      <h1>Teléfono</h1>
      <input type="text" id="telefono" placeholder="Telefono" required>
      <h1>Contraseña</h1>
      <input type="password" id="password" placeholder="Crear Contraseña" required>
      <h1>Confirmar Contraseña</h1>
      <input type="password" id="confirmar" placeholder="Confirmar Contraseña" required>

      <button type="submit">Registrarse</button>
    </form>
  </div>
</main>
<footer >© 2026 Fashion Style - Todos los derechos reservados</footer>
  <script src="../JS/Registro.js"></script>
</body>
