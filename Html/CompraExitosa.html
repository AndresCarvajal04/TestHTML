<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Exitosa - Fashion Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
             font-family: 'Montserrat', sans-serif; 'Roboto', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .icon-check {
            font-size: 80px;
            color: #28a745; /* Verde éxito */
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 10px; color: #333; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .home-btn {
            background: #000;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }
        .home-btn:hover { background: #333; }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="fa-regular fa-circle-check icon-check"></i>
        <h1>¡Pago Exitoso!</h1>
        <p>Gracias por tu compra en Fashion Style.<br>Hemos enviado los detalles de tu pedido a tu correo electrónico.</p>
        <a href="CarritoIngresoDePago.html" class="home-btn">Volver a la Tienda</a>
    </div>
</body>
</html>
