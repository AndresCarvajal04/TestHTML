<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Fashion Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="../CSS/CarritoDeCompras.css">
</head>
<body>

    <header class="site-header">
        <div class="brand-logo">

            <a href="index.html"><img src="../assets/iconoFSImprove-nobg.png" alt="Fashion Style" class="header-logo-img"></a>
        </div>
        <div class="header-icons">
            <div class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="icon-btn"><i class="fa-regular fa-user"></i></div>
        </div>
    </header>

    <main class="checkout-card">
        
        <div class="progress-header">
            <button class="back-btn" ><i class="fa-solid fa-arrow-left"></i></button>
            <div class="progress-steps">
                <div class="step active"><i class="fa-solid fa-cart-shopping"></i></div>
                <div class="step-line active"></div>
                <div class="step active"><i class="fa-regular fa-credit-card"></i></div>
                <div class="step-line"></div>
                <div class="step"><i class="fa-solid fa-check"></i></div>
            </div>
        </div>

        <div class="middle-section">
            <div class="form-scroll-container">
                <form class="form-grid" id="checkoutForm">
                    
                    <h2 class="section-title full-width">Datos de Envío y Facturación</h2>

                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" placeholder="Tu nombre">
                    </div>
                    <div class="input-group">
                        <label>Apellido</label>
                        <input type="text" id="apellido" placeholder="Tu apellido">
                    </div>

                    <div class="input-group">
                        <label>Tipo de Documento</label>
                        <select id="identificacion">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Número de Documento</label>
                        <input type="number" id="numero_documento" placeholder="Ej: 1098765432">
                    </div>

                    <div class="input-group">
                        <label>Departamento</label>
                        <select id="departamento">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Ciudad</label>
                        <select id="ciudad" disabled>
                            <option value="">Selecciona departamento</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label>Dirección de Entrega</label>
                        <input type="text" id="direccion" placeholder="Ej: Carrera 15 # 45-10, Barrio...">
                    </div>

                    <div class="input-group">
                        <label>Barrio / Localidad</label>
                        <input type="text" id="barrio">
                    </div>
                    <div class="input-group">
                        <label>Teléfono de Contacto</label>
                        <input type="tel" id="telefono">
                    </div>

                    <div class="form-divider full-width"></div>

                    <h2 class="section-title full-width">
                        <i class="fa-regular fa-credit-card"></i> Datos de Pago
                    </h2>

                    <div class="input-group full-width">
                        <label>Número de Tarjeta</label>
                        <div class="input-wrapper">
                            <input type="text" id="card_number" placeholder="0000 0000 0000 0000" maxlength="19">
                            <i class="fa-brands fa-cc-visa input-icon"></i>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>Nombre en la Tarjeta</label>
                        <input type="text" id="card_name" placeholder="Como aparece en el plástico">
                    </div>

                    <div class="input-group">
                        <label>Fecha de Expiración</label>
                        <input type="text" id="card_expiry" placeholder="MM/YY" maxlength="5">
                    </div>

                    <div class="input-group">
                        <label>Código de Seguridad (CVV)</label>
                        <div class="input-wrapper">
                            <input type="password" id="card_cvv" placeholder="123" maxlength="4">
                            <i class="fa-solid fa-lock input-icon"></i>
                        </div>
                    </div>
                    
                    <div class="full-width" style="height: 20px;"></div>
                </form>
            </div>

            <div class="logo-sidebar">
                <!-- RUTA CORREGIDA -->
                <a href="index.html"><img src="../assets/LogoFashionStyleImprove-nobg.png" alt="Fashion Style Logo" class="main-logo-img"></a>
            </div>
        </div>

        <footer class="checkout-footer" id="resumenCompra" style="display: none;">
            <div class="footer-left">
                <div class="product-carousel" id="cart-items-carousel"></div>
                <div class="whatsapp-btn" id="whatsappBtn">
                    <i class="fa-brands fa-whatsapp"></i>
                    <div><span>¿Ayuda?</span></div>
                </div>
            </div>

            <div class="footer-center" id="cart-list-details"></div>

            <div class="footer-right">
                <div id="cart-totals"></div>
                <button class="pay-btn" id="payBtn">
                    PAGAR Y CONFIRMAR <i class="fa-solid fa-check-circle"></i>
                </button>
            </div>
        </footer>

    </main>
    <!-- RUTA CORREGIDA -->
    <script src="../JS/cartStorage.js"></script>
    <script src="../JS/CarritoDeCompras.js"></script>
</body>
</html>
